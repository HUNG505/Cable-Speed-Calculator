<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>電纜速度計算</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Prop Types (Dependency for some UMD builds) -->
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>

    <!-- Recharts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      body {
        font-family: 'Noto Sans TC', sans-serif;
        -webkit-tap-highlight-color: transparent; /* 移除手機點擊閃爍 */
      }
      /* Custom animation for the settings icon */
      @keyframes spin-slow {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      .animate-spin-slow {
        animation: spin-slow 3s linear infinite;
      }
      
      /* 確保在小螢幕上圖表提示框不會被裁切 */
      .recharts-tooltip-wrapper {
        z-index: 50;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;
      // Recharts is now guaranteed to be defined after loading the specific version
      const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

      // --- Icons (Inline SVGs to remove Lucide dependency) ---
      
      const IconSettings = ({ className, style }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}>
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      );

      const IconActivity = ({ className }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
      );

      const IconRotateCw = ({ className }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path>
          <path d="M21 3v5h-5"></path>
        </svg>
      );

      const IconArrowRightLeft = ({ className }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="m16 7 5 5-5 5"></path>
          <path d="M4 12h17"></path>
          <path d="m8 17-5-5 5-5"></path>
        </svg>
      );

      // --- Constants ---
      
      const CalculationMode = {
        FindSpeed: 'FindSpeed',
        FindRPM: 'FindRPM',
      };

      // --- Components ---

      const Visualizer = ({ diameter = 500, rpm = 0, speed = 0 }) => {
        const visualRpm = Math.max(rpm, 1) / 10; 
        const animationDuration = 60 / visualRpm;

        return (
          <div className="flex flex-col h-full w-full">
            {/* Schematic Diagram */}
            <div className="flex-1 bg-white rounded-2xl shadow-sm border border-slate-100 relative overflow-hidden flex items-center justify-center p-4 sm:p-8 min-h-[220px] sm:min-h-[300px] w-full">
              <div className="absolute top-3 left-3 sm:top-4 sm:left-4 text-[10px] sm:text-xs font-semibold text-slate-400 uppercase tracking-wider">
                示意圖
              </div>
              
              <svg viewBox="0 0 400 300" className="w-full h-full max-w-xs sm:max-w-md">
                <defs>
                  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
                  </marker>
                </defs>

                {/* Reel Circle */}
                <g transform="translate(150, 150)">
                  {/* Rotating part */}
                  <g style={{ animation: `spin ${animationDuration}s linear infinite` }}>
                    <circle cx="0" cy="0" r="80" fill="#f1f5f9" stroke="#94a3b8" strokeWidth="2" />
                    <circle cx="0" cy="0" r="20" fill="#e2e8f0" stroke="#cbd5e1" strokeWidth="2" />
                    {/* Spoke lines to show rotation */}
                    <line x1="-80" y1="0" x2="80" y2="0" stroke="#cbd5e1" strokeWidth="1" />
                    <line x1="0" y1="-80" x2="0" y2="80" stroke="#cbd5e1" strokeWidth="1" />
                  </g>

                  {/* Diameter Dimension */}
                  <line x1="-85" y1="0" x2="-85" y2="-90" stroke="#64748b" strokeWidth="1" strokeDasharray="4 2" />
                  <line x1="85" y1="0" x2="85" y2="-90" stroke="#64748b" strokeWidth="1" strokeDasharray="4 2" />
                  <line x1="-85" y1="-85" x2="85" y2="-85" stroke="#64748b" strokeWidth="1" markerEnd="url(#arrowhead)" markerStart="url(#arrowhead)" />
                  <text x="0" y="-95" textAnchor="middle" fill="#475569" fontSize="14" fontWeight="bold">
                    D = {diameter} mm
                  </text>

                   {/* Radius Line for RPM label */}
                   <path d="M 60 -60 A 85 85 0 0 1 100 0" fill="none" stroke="#94a3b8" strokeWidth="2" markerEnd="url(#arrowhead)" />
                   <text x="110" y="-40" fill="#64748b" fontSize="14" fontWeight="bold">
                     {rpm > 0 ? rpm.toFixed(1) : 0} RPM
                   </text>
                </g>

                {/* Cable Line */}
                <g transform="translate(150, 70)">
                   {/* The cable coming off the top tangent */}
                  <line x1="0" y1="0" x2="200" y2="0" stroke="#475569" strokeWidth="4" />
                  {/* Speed Arrow */}
                  <line x1="50" y1="-20" x2="150" y2="-20" stroke="#64748b" strokeWidth="2" markerEnd="url(#arrowhead)" />
                  <text x="100" y="-30" textAnchor="middle" fill="#64748b" fontSize="14" fontWeight="bold">
                    V = {speed > 0 ? speed.toFixed(1) : 0} m/min
                  </text>
                </g>
                
                <style>{`
                  @keyframes spin {
                    from { transform: rotate(0deg); }
                    to { transform: rotate(360deg); }
                  }
                `}</style>
              </svg>
            </div>
          </div>
        );
      };

      const Calculator = () => {
        const [mode, setMode] = useState(CalculationMode.FindSpeed);
        
        // Inputs
        const [diameter, setDiameter] = useState('1250'); // Outer diameter (D)
        const [innerDiameter, setInnerDiameter] = useState('625'); // Inner diameter (d)
        const [inputValue, setInputValue] = useState('800'); // Either RPM or Speed depending on mode
        const [isInnerCustom, setIsInnerCustom] = useState(false); // Track if user manually set inner diameter
        
        // Results
        const [calculatedResult, setCalculatedResult] = useState({ 
          outer: 0, 
          inner: 0 
        });
        
        // Derived values for visualization
        const currentRPM = mode === CalculationMode.FindSpeed ? parseFloat(inputValue) : calculatedResult.outer;
        const currentSpeed = mode === CalculationMode.FindRPM ? parseFloat(inputValue) : calculatedResult.outer;
        const currentDiameter = parseFloat(diameter);
        const currentInnerDiameter = parseFloat(innerDiameter);

        // Auto-update inner diameter when outer diameter changes, unless custom
        useEffect(() => {
          if (!isInnerCustom && diameter) {
            const d = parseFloat(diameter);
            if (!isNaN(d)) {
              setInnerDiameter((d / 2).toString());
            }
          }
        }, [diameter, isInnerCustom]);

        // Handlers
        const handleInnerDiameterChange = (e) => {
          setInnerDiameter(e.target.value);
          setIsInnerCustom(true);
        };

        const handleCalculate = () => {
          const D = parseFloat(diameter); // Outer
          const d = parseFloat(innerDiameter); // Inner
          const input = parseFloat(inputValue);

          if (isNaN(D) || isNaN(d) || isNaN(input) || D <= 0 || d <= 0) {
            setCalculatedResult({ outer: 0, inner: 0 });
            return;
          }

          if (mode === CalculationMode.FindSpeed) {
            // V = (PI * Dia * RPM) / 1000
            const speedOuter = (Math.PI * D * input) / 1000;
            const speedInner = (Math.PI * d * input) / 1000;
            setCalculatedResult({ 
              outer: parseFloat(speedOuter.toFixed(2)), 
              inner: parseFloat(speedInner.toFixed(2)) 
            });
          } else {
            // RPM = (V * 1000) / (PI * D)
            const rpm = (input * 1000) / (Math.PI * D);
            
            // V_inner = (PI * d * rpm) / 1000
            const speedInnerAtCalculatedRPM = (Math.PI * d * rpm) / 1000;
            
            setCalculatedResult({ 
              outer: parseFloat(rpm.toFixed(2)), 
              inner: parseFloat(speedInnerAtCalculatedRPM.toFixed(2)) 
            });
          }
        };

        useEffect(() => {
          handleCalculate();
        }, [diameter, innerDiameter, inputValue, mode]);

        // Generate Chart Data
        const chartData = [];
        if (!isNaN(currentInnerDiameter) && !isNaN(currentDiameter) && !isNaN(currentRPM) && currentRPM > 0 && currentDiameter > currentInnerDiameter) {
          const steps = 5; 
          const stepSize = (currentDiameter - currentInnerDiameter) / (steps - 1);
          
          for (let i = 0; i < steps; i++) {
            const dia = currentInnerDiameter + (stepSize * i);
            const spd = (Math.PI * dia * currentRPM) / 1000;
            chartData.push({
              diameter: Math.round(dia),
              speed: parseFloat(spd.toFixed(1))
            });
          }
        }

        return (
          <div className="w-full max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8 items-start">
            
            {/* Left Column: Visualization (在手機版移至下方) */}
            <div className="order-2 lg:order-1 flex flex-col gap-6 md:gap-8 w-full">
              <Visualizer 
                diameter={isNaN(currentDiameter) ? 500 : currentDiameter}
                rpm={isNaN(currentRPM) ? 0 : currentRPM}
                speed={isNaN(currentSpeed) ? 0 : currentSpeed}
              />
              
              {/* Diameter vs Line Speed Chart */}
              <div className="bg-white rounded-3xl shadow-lg border border-slate-200 p-5 sm:p-8 w-full">
                <h3 className="text-base sm:text-lg font-bold text-slate-700 mb-6 flex items-center gap-2">
                  <IconActivity className="w-4 h-4 sm:w-5 sm:h-5 text-slate-500" />
                  直徑與線速度關係圖
                </h3>
                <div className="h-[280px] sm:h-[320px] w-full -ml-2 sm:ml-0">
                  <ResponsiveContainer width="100%" height="100%">
                    <LineChart
                      data={chartData}
                      margin={{ top: 20, right: 20, left: 10, bottom: 45 }}
                    >
                      <CartesianGrid strokeDasharray="3 3" vertical={true} horizontal={true} stroke="#e2e8f0" />
                      <XAxis 
                        dataKey="speed" 
                        label={{ value: '線速度 (m/min)', position: 'insideBottom', offset: -35, fill: '#64748b', fontSize: 12 }} 
                        tick={{ fill: '#64748b', fontSize: 11, dy: 10 }}
                        tickFormatter={(value) => `${value}`}
                      />
                      <YAxis 
                        dataKey="diameter"
                        label={{ value: '軸直徑 (mm)', angle: -90, position: 'insideLeft', offset: 15, fill: '#64748b', fontSize: 12 }}
                        tick={{ fill: '#64748b', fontSize: 11 }}
                        tickFormatter={(value) => `${value}`}
                        domain={[dataMin => Math.floor(dataMin), dataMax => Math.ceil(dataMax)]}
                        width={65}
                      />
                      <Tooltip 
                        contentStyle={{ backgroundColor: '#fff', borderRadius: '12px', border: '1px solid #e2e8f0', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)', fontSize: '12px' }}
                        formatter={(value, name) => [
                          name === 'diameter' ? `${value} mm` : `${value} m/min`,
                          name === 'diameter' ? '直徑' : '速度'
                        ]}
                        labelFormatter={() => ''}
                      />
                      <Line 
                        type="monotone" 
                        dataKey="diameter" 
                        stroke="#64748b" 
                        strokeWidth={2}
                        dot={{ r: 4, fill: '#64748b', strokeWidth: 0 }}
                        activeDot={{ r: 6, fill: '#475569' }}
                      />
                    </LineChart>
                  </ResponsiveContainer>
                </div>
                <p className="text-center text-[10px] sm:text-xs text-slate-400 mt-8">
                  * 此圖表顯示在轉速固定為 {currentRPM.toFixed(1)} RPM 時，線速度隨直徑變化的趨勢
                </p>
              </div>
            </div>

            {/* Right Column: Controls (在手機版移至上方) */}
            <div className="order-1 lg:order-2 w-full">
              <div className="bg-white rounded-3xl shadow-lg border border-slate-200 p-5 sm:p-8">
                
                <h2 className="text-lg sm:text-xl font-bold text-slate-700 mb-5 sm:mb-6 flex items-center gap-2">
                  <IconActivity className="w-5 h-5 sm:w-6 sm:h-6 text-slate-500" />
                  參數設定
                </h2>

                {/* Mode Toggle */}
                <div className="mb-6 sm:mb-8">
                  <label className="block text-xs sm:text-sm font-medium text-slate-500 mb-2 sm:mb-3">計算模式</label>
                  <div className="bg-slate-100 p-1 rounded-full flex relative">
                    {/* Sliding Background for Toggle */}
                    <div 
                      className={`absolute top-1 bottom-1 w-[calc(50%-4px)] bg-slate-600 rounded-full shadow-sm transition-all duration-300 ease-out ${mode === CalculationMode.FindSpeed ? 'left-1' : 'left-[calc(50%+2px)]'}`}
                    ></div>
                    
                    <button
                      onClick={() => setMode(CalculationMode.FindSpeed)}
                      className={`flex-1 relative z-10 py-2.5 sm:py-3 text-xs sm:text-sm font-bold transition-colors duration-300 rounded-full flex items-center justify-center gap-1.5 sm:gap-2 ${mode === CalculationMode.FindSpeed ? 'text-white' : 'text-slate-500 hover:text-slate-700'}`}
                    >
                      <IconRotateCw className="w-3.5 h-3.5 sm:w-4 sm:h-4" />
                      求線速度
                    </button>
                    <button
                      onClick={() => setMode(CalculationMode.FindRPM)}
                      className={`flex-1 relative z-10 py-2.5 sm:py-3 text-xs sm:text-sm font-bold transition-colors duration-300 rounded-full flex items-center justify-center gap-1.5 sm:gap-2 ${mode === CalculationMode.FindRPM ? 'text-white' : 'text-slate-500 hover:text-slate-700'}`}
                    >
                      <IconArrowRightLeft className="w-3.5 h-3.5 sm:w-4 sm:h-4" />
                      求轉速
                    </button>
                  </div>
                </div>

                <div className="space-y-5 sm:space-y-6">
                  
                  {/* Inputs Grid: 1 column on mobile, 2 columns on larger screens */}
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    {/* Outer Diameter Input */}
                    <div className="group">
                      <label className="block text-xs sm:text-sm font-bold text-slate-600 mb-1.5 sm:mb-2 group-focus-within:text-slate-800 transition-colors">
                        鐵軸直徑 D (mm)
                      </label>
                      <div className="relative">
                        <input
                          type="number"
                          value={diameter}
                          onChange={(e) => setDiameter(e.target.value)}
                          className="block w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-3 sm:px-4 sm:py-4 text-slate-900 focus:border-slate-500 focus:bg-white focus:ring-2 focus:ring-slate-500/20 transition-all outline-none font-mono text-base sm:text-lg"
                          placeholder="輸入直徑"
                        />
                        <div className="absolute inset-y-0 right-0 flex items-center pr-3 sm:pr-4 pointer-events-none">
                          <span className="text-slate-400 font-medium bg-white px-2 py-0.5 sm:py-1 rounded-md border border-slate-100 text-xs sm:text-sm">mm</span>
                        </div>
                      </div>
                    </div>

                    {/* Inner Diameter Input */}
                    <div className="group">
                      <label className="block text-xs sm:text-sm font-bold text-slate-600 mb-1.5 sm:mb-2 group-focus-within:text-slate-800 transition-colors">
                        軸底徑 d (mm)
                      </label>
                      <div className="relative">
                        <input
                          type="number"
                          value={innerDiameter}
                          onChange={handleInnerDiameterChange}
                          className="block w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-3 sm:px-4 sm:py-4 text-slate-900 focus:border-slate-500 focus:bg-white focus:ring-2 focus:ring-slate-500/20 transition-all outline-none font-mono text-base sm:text-lg"
                          placeholder="輸入直徑"
                        />
                        <div className="absolute inset-y-0 right-0 flex items-center pr-3 sm:pr-4 pointer-events-none">
                          <span className="text-slate-400 font-medium bg-white px-2 py-0.5 sm:py-1 rounded-md border border-slate-100 text-xs sm:text-sm">mm</span>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Dynamic Input (RPM or Speed) */}
                  <div className="group">
                    <label className="block text-xs sm:text-sm font-bold text-slate-600 mb-1.5 sm:mb-2 group-focus-within:text-slate-800 transition-colors">
                      {mode === CalculationMode.FindSpeed ? '轉速 (RPM)' : '線速度 (m/min)'}
                    </label>
                    <div className="relative">
                      <input
                        type="number"
                        value={inputValue}
                        onChange={(e) => setInputValue(e.target.value)}
                        className="block w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-3 sm:px-4 sm:py-4 text-slate-900 focus:border-slate-500 focus:bg-white focus:ring-2 focus:ring-slate-500/20 transition-all outline-none font-mono text-base sm:text-lg"
                        placeholder="輸入數值"
                      />
                      <div className="absolute inset-y-0 right-0 flex items-center pr-3 sm:pr-4 pointer-events-none">
                        <span className="text-slate-400 font-medium bg-white px-2 py-0.5 sm:py-1 rounded-md border border-slate-100 text-xs sm:text-sm">
                          {mode === CalculationMode.FindSpeed ? 'RPM' : 'm/min'}
                        </span>
                      </div>
                    </div>
                  </div>

                  {/* Result Display */}
                  <div className="mt-6 sm:mt-8 pt-6 sm:pt-8 border-t border-dashed border-slate-200 space-y-3 sm:space-y-4">
                     <span className="text-slate-500 text-sm font-medium block mb-1 sm:mb-2">計算結果</span>
                     
                     {/* Outer Diameter Result */}
                     <div className="flex flex-row justify-between items-center bg-slate-50 p-3 sm:p-4 rounded-xl gap-2">
                       <div className="flex flex-col">
                         <span className="text-[10px] sm:text-xs text-slate-500 mb-0.5 sm:mb-1">鐵軸直徑 D</span>
                         <span className="text-sm sm:text-base font-medium text-slate-600 whitespace-nowrap">
                           {mode === CalculationMode.FindSpeed ? '線速度' : '轉速'}
                         </span>
                       </div>
                       <div className="text-right flex items-baseline gap-1 sm:gap-2">
                         <span className="text-2xl sm:text-3xl font-black text-slate-800 tracking-tight">
                           {calculatedResult.outer.toLocaleString()}
                         </span>
                         <span className="text-xs sm:text-sm text-slate-400 font-medium whitespace-nowrap">
                           {mode === CalculationMode.FindSpeed ? 'm/min' : 'RPM'}
                         </span>
                       </div>
                     </div>

                     {/* Inner Diameter Result */}
                     <div className="flex flex-row justify-between items-center bg-slate-50 p-3 sm:p-4 rounded-xl gap-2">
                        <div className="flex flex-col">
                         <span className="text-[10px] sm:text-xs text-slate-500 mb-0.5 sm:mb-1">軸底徑 d</span>
                         <span className="text-sm sm:text-base font-medium text-slate-600 whitespace-nowrap">
                           線速度
                         </span>
                       </div>
                       <div className="text-right flex items-baseline gap-1 sm:gap-2">
                         <span className="text-2xl sm:text-3xl font-black text-slate-800 tracking-tight">
                           {calculatedResult.inner.toLocaleString()}
                         </span>
                         <span className="text-xs sm:text-sm text-slate-400 font-medium whitespace-nowrap">
                           m/min
                         </span>
                       </div>
                     </div>
                  </div>

                </div>
              </div>
            </div>
          </div>
        );
      };

      const App = () => {
        return (
          <div className="min-h-screen bg-slate-50 py-6 sm:py-12 px-3 sm:px-6 lg:px-8 font-sans w-full">
            <header className="max-w-6xl mx-auto mb-8 sm:mb-12 text-center md:text-left">
              <div className="flex flex-col sm:flex-row items-center justify-center md:justify-start gap-2 sm:gap-3 mb-2">
                <div className="bg-slate-700 p-2 rounded-lg shadow-lg shadow-slate-200">
                   <IconSettings className="w-5 h-5 sm:w-6 sm:h-6 text-white animate-spin-slow" style={{ animationDuration: '3s' }} />
                </div>
                <h1 className="text-2xl sm:text-3xl md:text-4xl font-extrabold text-slate-800 tracking-tight">
                  電纜速度計算
                </h1>
              </div>
            </header>

            <main className="w-full">
              <Calculator />
            </main>

            <footer className="max-w-6xl mx-auto mt-10 sm:mt-16 pb-6 text-center text-slate-400 text-xs sm:text-sm">
              <p>© {new Date().getFullYear()} 電纜速度計算</p>
            </footer>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
